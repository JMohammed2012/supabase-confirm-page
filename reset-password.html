<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Dog Walker App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 12px;
        }
        p {
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }
        .button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .button:hover {
            background: #0055CC;
        }
        .hidden {
            display: none;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .success {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .info {
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <h1>Reset Password</h1>
        <p id="message">Enter your new password below.</p>
        
        <div id="errorMsg" class="error hidden"></div>
        <div id="successMsg" class="success hidden"></div>
        
        <div id="passwordForm">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="password" placeholder="Enter new password">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>
            <button class="button" id="submitBtn">Update Password</button>
        </div>
        
        <div id="loadingMsg" class="hidden">
            <p>Updating password...</p>
        </div>
        
        <div id="successPanel" class="hidden">
            <p>✅ Password updated successfully!</p>
            <p style="margin-top: 16px;">You can now close this page and return to the Dog Walker app on your iPhone to sign in with your new password.</p>
        </div>
        
        <p class="info">This page will close automatically when done.</p>
    </div>

    <script>
        // Parse the URL to get the tokens
        const hash = window.location.hash;
        const params = new URLSearchParams(hash.slice(1));
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const type = params.get('type');

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const passwordForm = document.getElementById('passwordForm');
        const loadingMsg = document.getElementById('loadingMsg');
        const successPanel = document.getElementById('successPanel');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Supabase URL for your project
        const SUPABASE_URL = 'https://qvgkajtvixozqcvfnjyt.supabase.co'; // Replace with your actual URL
        const SUPABASE_ANON_KEY = 'sb_publishable_ECU7ivYsRKMf4umo74pBzw_tiAgFPOL'; // Replace with your actual anon key

        if (!accessToken || type !== 'recovery') {
            errorMsg.classList.remove('hidden');
            errorMsg.textContent = 'Invalid or expired reset link. Please request a new password reset.';
            passwordForm.classList.add('hidden');
        }

        submitBtn.addEventListener('click', async () => {
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (!password || !confirm) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = 'Please fill in both fields';
                return;
            }

            if (password !== confirm) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = 'Passwords do not match';
                return;
            }

            if (password.length < 6) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = 'Password must be at least 6 characters';
                return;
            }

            errorMsg.classList.add('hidden');
            passwordForm.classList.add('hidden');
            loadingMsg.classList.remove('hidden');

            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({ password: password })
                });

                if (response.ok) {
                    loadingMsg.classList.add('hidden');
                    successPanel.classList.remove('hidden');
                    successMsg.classList.remove('hidden');
                    successMsg.textContent = 'Password updated successfully!';
                } else {
                    const error = await response.json();
                    throw new Error(error.msg || 'Failed to update password');
                }
            } catch (err) {
                loadingMsg.classList.add('hidden');
                passwordForm.classList.remove('hidden');
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = err.message;
            }
        });
        
    </script>
</body>
</html>
