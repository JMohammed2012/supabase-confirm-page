<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Email Confirmed | Dog Walker App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #34C759;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .success-icon::after {
            content: "✓";
            font-size: 48px;
            color: white;
            font-weight: bold;
        }
        h1 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 12px;
        }
        p {
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .button:hover {
            background: #0055CC;
        }
        .info {
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }
        .error {
            display: none;
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon"></div>
        <h1>Email Confirmed! 🎉</h1>
        <p>Your email address has been successfully verified.<br>You can now close this page and return to the app.</p>
        <a href="dogwalkerapp://auth/callback" class="button">Open Dog Walker App</a>
        <p class="info">If the button doesn't work, simply close this tab and return to the app manually.</p>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        const hash = window.location.hash;
        if (hash) {
            const params = new URLSearchParams(hash.slice(1));
            if (params.get('error_code')) {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.style.display = 'block';
                errorDiv.textContent = `Error: ${params.get('error_description') || 'Authentication failed. Please try again.'}`;
            }
        }
    </script>
</body>
</html>
